name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Validate curriculum and authored-question baseline
        run: |
          python3 scripts/validate_static_release.py
          python3 scripts/audit_question_agent_output.py --fail-on-regression

      - name: Build static site
        working-directory: frontend
        env:
          VITE_ATC_STATIC_DEPLOY: "true"
        run: npm run build

      - name: Install mobile test browser
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Run mobile smoke tests
        working-directory: frontend
        run: npm run test:mobile

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
